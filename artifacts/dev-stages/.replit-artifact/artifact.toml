kind = "slides"
previewPath = "/dev-stages/"
title = "How I Built It"
version = "1.0.0"
id = "artifacts/dev-stages"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dev-stages/" ]
localPort = 24699

[services.development]
run = "pnpm --filter @workspace/dev-stages run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dev-stages", "run", "build" ]
publicDir = "artifacts/dev-stages/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24699"
BASE_PATH = "/dev-stages/"
